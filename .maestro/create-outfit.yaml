appId: com.smartwardrobe.mobile
---
- launchApp
# Assuming user is already logged in and at Wardrobe tab
- assertVisible: "Tủ Đồ"
- tapOn: "Bộ phối"
- assertVisible: "Tạo bộ phối"
- tapOn:
    id: "create-outfit-btn"
- assertVisible: "CHƯA CHỌN MÓN ĐỒ NÀO"
# Open drawer to select items
- tapOn:
    id: "open-wardrobe-drawer-btn"
- tapOn:
    id: "wardrobe-item-0"
- tapOn:
    id: "close-wardrobe-drawer-btn"
- assertNotVisible: "CHƯA CHỌN MÓN ĐỒ NÀO"
- tapOn:
    id: "save-outfit-btn"
# Enter details
- inputText: "Maestro Outfit Test"
- tapOn: "Lưu Bộ Phối"
- assertVisible: "Thành công"
